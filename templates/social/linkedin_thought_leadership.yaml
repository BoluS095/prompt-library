name: LinkedIn Thought Leadership Graphic
model: dall-e-3
category: social

prompt: >
  Professional LinkedIn post graphic, abstract representation of
  {concept}, corporate modern style, clean composition with space
  for text overlay on {side}, subtle gradient background using
  {colors}, sophisticated and authoritative feel, 1200x627 ratio

settings:
